name: Release Bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-bundles:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standard offline bundle
        run: |
          bash scripts/build_offline_bundle.sh

      - name: Build HEIC offline bundle
        run: |
          INCLUDE_HEIF=1 BUNDLE_NAME=truescaler-bundle-heif bash scripts/build_offline_bundle.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: truescaler-bundles
          path: |
            dist/truescaler-bundle.tar.gz
            dist/truescaler-bundle-heif.tar.gz

      - name: Publish release assets on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/truescaler-bundle.tar.gz
            dist/truescaler-bundle-heif.tar.gz

