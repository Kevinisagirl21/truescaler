name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages (HEIC codecs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libopencv-dev \
            libheif-dev \
            libde265-dev \
            libx265-dev

      - name: Install Python dependencies and native backend
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e . \
            pillow-heif \
            pytest

      - name: Verify native extension import
        run: |
          python -c "import _truescaler_core; print(_truescaler_core.__name__)"

      - name: Run tests
        run: |
          pytest -q
