name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages (HEIC codecs)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libheif-dev \
            libde265-dev \
            libx265-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy \
            pillow \
            pillow-heif \
            pytest

      - name: Run tests
        run: |
          pytest -q
